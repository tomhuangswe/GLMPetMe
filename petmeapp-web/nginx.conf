# ─────────────────────────────────────────────────────────────────────────────
# Nginx 反向代理配置示例
# 适用于服务器：138.197.89.249
#
# 说明：
#   - 根路径 /          → 你的另一个产品（已运行在 3000 端口，保持不变）
#   - /petmeapp/...     → PetMe Web App（运行在 3001 端口）
#
# 部署步骤：
#   1. 在服务器上安装 Node + npm，cd 到 petmeapp-web 目录
#   2. npm install && npm run build
#   3. 用 serve 或 pm2 在 3001 端口提供静态文件（见下方说明）
#   4. 将本配置合并到 /etc/nginx/sites-available/default 并 nginx -s reload
# ─────────────────────────────────────────────────────────────────────────────

server {
    listen 80;
    server_name 138.197.89.249;

    # ── 你的另一个产品（根路径，保持不变）────────────────────────────────────
    location / {
        proxy_pass         http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # ── PetMe Web App ─────────────────────────────────────────────────────────
    # 所有 /petmeapp/* 请求直接由 Nginx 提供构建后的静态文件
    location /petmeapp/ {
        alias /var/www/petmeapp/;   # ← 将 dist/ 目录内容复制到这里
        try_files $uri $uri/ /petmeapp/index.html;
        expires 1d;
        add_header Cache-Control "public, no-transform";
    }

    # 静态资源（JS/CSS/图片）长缓存
    location ~* ^/petmeapp/.+\.(js|css|png|jpg|svg|ico|woff2?)$ {
        alias /var/www/petmeapp/;
        rewrite ^/petmeapp/(.*)$ /$1 break;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}

# ─────────────────────────────────────────────────────────────────────────────
# 快速部署命令（在服务器上执行）：
#
#   # 1. 构建
#   cd /path/to/petmeapp-web
#   npm install
#   npm run build
#
#   # 2. 复制静态文件到 Nginx 目录
#   sudo mkdir -p /var/www/petmeapp
#   sudo cp -r dist/* /var/www/petmeapp/
#
#   # 3. 重载 Nginx
#   sudo nginx -t && sudo nginx -s reload
# ─────────────────────────────────────────────────────────────────────────────
